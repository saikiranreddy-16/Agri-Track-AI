name: AgriTrack AI Fullstack CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Lint Codebase
        run: npm run lint

      - name: Run Backend Unit & Integration Tests
        run: cd backend && npm run test

      - name: Run Frontend Component Tests
        run: npm run test

      - name: Security Vulnerability Audit
        run: npm audit --audit-level=high

      - name: Build Static React Frontend Assets
        run: npm run build

      - name: Upload Built Frontend Assets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  docker-verify:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
