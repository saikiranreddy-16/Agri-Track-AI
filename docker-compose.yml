version: '3.8'

services:
  mongodb-service:
    image: mongo:6.0
    container_name: agritrack-mongo
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - agritrack-network

  backend-service:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: agritrack-backend
    environment:
      - MONGO_URI=mongodb://mongodb-service:27017/agri-track-db
    depends_on:
      - mongodb-service
    restart: unless-stopped
    volumes:
      - backend_logs:/app/logs
      - backend_backups:/app/backups
    networks:
      - agritrack-network

  proxy-service:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: agritrack-nginx
    ports:
      - "80:80"
    depends_on:
      - backend-service
    restart: unless-stopped
    networks:
      - agritrack-network

volumes:
  mongodb_data:
  backend_logs:
  backend_backups:

networks:
  agritrack-network:
    driver: bridge
